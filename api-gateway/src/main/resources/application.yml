spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        # User Service Routes
        - id: user-registration
          uri: lb://user-service
          predicates:
            - Path=/api/v1.0/blogsite/user/register
            - Method=POST
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
        
        - id: user-login
          uri: lb://user-service
          predicates:
            - Path=/api/v1.0/blogsite/user/login
            - Method=POST
        
        # Blog Command Service Routes (Write Operations)
        - id: blog-add
          uri: lb://blog-command-service
          predicates:
            - Path=/api/v1.0/blogsite/user/blogs/add/**
            - Method=POST
          filters:
            - AuthenticationFilter
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
        
        - id: blog-delete
          uri: lb://blog-command-service
          predicates:
            - Path=/api/v1.0/blogsite/user/delete/**
            - Method=DELETE
          filters:
            - AuthenticationFilter
        
        # Blog Query Service Routes (Read Operations)
        - id: blog-by-category
          uri: lb://blog-query-service
          predicates:
            - Path=/api/v1.0/blogsite/blogs/info/**
            - Method=GET
        
        - id: blog-by-user
          uri: lb://blog-query-service
          predicates:
            - Path=/api/v1.0/blogsite/user/getall
            - Method=GET
          filters:
            - AuthenticationFilter
        
        - id: blog-by-category-duration
          uri: lb://blog-query-service
          predicates:
            - Path=/api/v1.0/blogsite/blogs/get/**
            - Method=GET
      
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - DELETE
              - PUT
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: false

server:
  port: 8080
  ssl:
    enabled: false
    # Uncomment for SSL in production
    # key-store: classpath:keystore.p12
    # key-store-password: changeit
    # key-store-type: PKCS12
    # key-alias: blogsite

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

jwt:
  secret: ${JWT_SECRET:blogsite-secret-key-for-jwt-token-generation-and-validation-2026}
  expiration: 86400000 # 24 hours

# Rate Limiting Configuration
redis:
  host: localhost
  port: 6379

springdoc:
  swagger-ui:
    urls:
      - url: /swagger/user-service/v3/api-docs
        name: User Service
      - url: /swagger/blog-command-service/v3/api-docs
        name: Blog Command Service
      - url: /swagger/blog-query-service/v3/api-docs
        name: Blog Query Service

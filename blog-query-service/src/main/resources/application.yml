spring:
  application:
    name: blog-query-service
  
  data:
    mongodb:
      uri: mongodb://localhost:27017/blogdb
      auto-index-creation: true
    # Redis is optional; disabling for local testing to avoid connection errors
    #redis:
    #  host: localhost
    #  port: 6379
    #  timeout: 2000ms
  
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: blog-query-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  
  cache:
    type: simple
    #redis:
    #  time-to-live: 600000 # 10 minutes

server:
  port: 8083

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    hostname: localhost

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,caches
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    com.blogsite.query: DEBUG
    org.springframework.web: INFO
    org.springframework.data.mongodb: DEBUG
    org.springframework.kafka: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/blog-query-service.log
